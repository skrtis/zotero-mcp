services:
  - type: web
    name: zotero-mcp-server
    runtime: python
    pythonVersion: "3.11"
    buildCommand: pip install -r requirements.txt
    startCommand: python src/server.py
    plan: free
    autoDeploy: false
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: ZOTERO_LIBRARY_ID
        sync: false
      - key: ZOTERO_API_KEY
        sync: false
      - key: ZOTERO_LIBRARY_TYPE
        value: user
      - key: ZOTERO_LOCAL
        value: "false"
